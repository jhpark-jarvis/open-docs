services:
  db:
    image: postgres:16-alpine
    container_name: opendocs-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opendocs}
      POSTGRES_USER: ${POSTGRES_USER:-opendocs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opendocs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opendocs} -d ${POSTGRES_DB:-opendocs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    container_name: opendocs-api
    env_file:
      - .env
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      API_PREFIX: ${API_PREFIX:-/api}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://opendocs:opendocs@db:5432/opendocs}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      YJS_WS_URL: ${YJS_WS_URL:-ws://localhost:1234}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./apps/web
    container_name: opendocs-web
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  web_node_modules:
